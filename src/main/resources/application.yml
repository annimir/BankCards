spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bankcards
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/migration/changelog-master.xml
    enabled: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000
  refresh-expiration: 604800000

card:
  encryption:
    secret: ${CARD_ENCRYPTION_SECRET:MySecretKey12345MySecretKey12345}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8080

logging:
  level:
    com.example.bankcards: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    # %X{traceId} и %X{username} берутся из MDC — присутствуют в каждой строке
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:--}] [%X{username:--}] %-5level %logger{36} - %msg%n"
    file:    "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:--}] [%X{username:--}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/bankcards.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,caches
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  info:
    env:
      enabled: true

info:
  app:
    name: BankCards Management System
    version: 1.0.0
    description: REST API for bank card management

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}